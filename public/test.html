<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
<div id="contact-modal" class="modal">
            <div class="modal-content contact-form-modal">
              <div class="modal-header">
                <h3 id="contact-modal-title">Ajouter un contact</h3>
                <button id="close-modal-btn" class="btn-close">×</button> </div>
              <form id="contact-form">
                <!-- En-tête du formulaire -->
                <div class="form-header-info"> <input id="contact-id" type="hidden">
                  <button type="button" id="cancel-edit-btn" class="btn btn-secondary cancel-btn"

                    style="display:none;">Annuler</button> </div>
                <!-- Section: Informations personnelles -->
                <h4><i class="fas fa-user-circle"></i> Informations personnelles</h4>
                <!-- Champ Nom -->
                <div class="form-grid">
                  <div class="form-group full-width"> <label for="nom" title="Le nom de famille du contact"><i class="fas fa-user"></i>
                      Nom <span class="required">*</span></label> <input id="nom" required="" placeholder="ex: Dupont" type="text"> </div>
                  <!-- Champ Prénom -->
                  <div class="form-group full-width"> <label for="prenom" title="Le prénom du contact"><i class="fas fa-user"></i>
                      Prénom <span class="required">*</span></label> <input id="prenom"

                      required="" placeholder="ex: Jean" type="text"> </div>
                </div>
                <!-- Champ Titre -->
                <div class="form-group full-width"> <label for="titre" title="Titre professionnel : Dr., Prof., Ing., ou honorifique"><i class="fas fa-user-tag"></i>
                    Titre (optionnel)</label> <input id="titre" placeholder="Dr., Prof., Ing., Mme, M."

                    type="text"> </div>
                <!-- Champ Surnom -->
                <div class="form-group full-width"> <label for="surnom" title="Surnom ou diminutif (sans espace)"><i class="fas fa-masks"></i>
                    Surnom (optionnel)</label> <input id="surnom" placeholder="Jeanne, Toto"

                    type="text"> </div>
                <!-- Grille pour Email et Téléphone -->
                <div class="form-grid">
                  <div class="form-group"> <label for="email"><i class="fas fa-envelope"></i>
                      Email</label> <input id="email" placeholder="jean.dupont@email.com"

                      type="email"> </div>
                  <div class="form-group"> <label for="telephone"><i class="fas fa-phone"></i>
                      Téléphone</label> <input id="telephone" placeholder="+33 1 23 45 67 89"

                      type="tel"> </div>
                </div>
                <!-- Section: Informations organisationnelles -->
                <h4><i class="fas fa-briefcase"></i> Organisation</h4>
                <!-- Champ Organisation -->
                <div class="form-group full-width"> <label for="organisation" title="Nom de l'organisation ou entreprise"><i

                      class="fas fa-building"></i> Organisation</label> <input

                    id="organisation" placeholder="Ma Entreprise SAS" type="text"> </div>
                <!-- Grille pour Rôle et Conjoint -->
                <div class="form-grid">
                  <div class="form-group full-width"> <label for="conjoint" title="Nom complet du conjoint"><i

                        class="fas fa-users"></i> Conjoint(e) (optionnel)</label>
                    <input id="conjoint" placeholder="Sophie Dupont" type="text"> </div>
                </div>
                <!-- Section: Adresse -->
                <h4><i class="fas fa-map-marker-alt"></i> Adresse (optionnel)</h4>
                <!-- Grille pour adresse et code postal -->
                <div class="form-grid">
                  <div class="form-group full-width"> <label for="adresse" title="Rue ou adresse complète"><i class="fas fa-location-dot"></i>
                      Adresse</label> <input id="adresse" placeholder="12 rue de la Paix, Appartement 4"

                      type="text"> </div>
                  <div class="form-group full-width"> <label for="code_postal" title="Code postal en chiffres"><i

                        class="fas fa-hashtag"></i> Code postal (optionnel)</label>
                    <input id="code_postal" placeholder="75001" type="text"> </div>
                </div>
                <!-- Grille pour ville, région, pays -->
                <div class="form-grid">
                  <div class="form-group full-width"> <label for="ville" title="Nom de la ville"><i class="fas fa-city"></i>
                      Ville (optionnel)</label> <input id="ville" placeholder="Paris"

                      type="text"> </div>
                  <div class="form-group full-width"> <label for="region" title="Région ou département"><i class="fas fa-layer-group"></i>
                      Région / Département (optionnel)</label> <input id="region"

                      placeholder="Île-de-France" type="text"> </div>
                </div>
                <!-- Grille pour pays et tags -->
                <div class="form-grid">
                  <div class="form-group full-width"> <label for="pays" title="Nom du pays"><i class="fas fa-globe"></i>
                      Pays (optionnel)</label> <input id="pays" placeholder="France"

                      type="text"> </div>
                  <div class="form-group full-width"> <label for="tags-input" title="Séparez les tags avec des point-virgules. Cliquez sur 'Enregistrer' pour créer les catégories."><i

                        class="fas fa-tags"></i> Tags/Catégories</label> <input

                      id="tags-input" placeholder="Lien, Client (séparés par ;)"

                      type="text"> </div>
                </div>
                <!-- Section: Dates et événements -->
                <h4><i class="fas fa-calendar-alt"></i> Dates (optionnel)</h4>
                <!-- Champ Anniversaire -->
                <div class="form-group full-width"> <label for="anniversaire" title="Format YYYY-MM-DD. Ex: 1985-06-15"><i

                      class="fas fa-birthday-cake"></i> Anniversaire (optionnel)</label>
                  <input id="anniversaire" placeholder="ex: 1985-06-15" type="date"> </div>
                <!-- Section: Notes -->
                <h4><i class="fas fa-sticky-note"></i> Notes (optionnel)</h4>
                <!-- Champ Notes -->
                <div class="form-group full-width"> <label for="notes" title="Notes personnelles, coordonnées alternatives, etc."><i class="fas fa-comment-alt"></i>
                    Notes</label> <textarea id="notes" rows="5" placeholder="Informations supplémentaires sur ce contact..."></textarea> </div>
                <!-- Boutons -->
                <div class="form-actions"> <button type="submit" id="save-contact-btn"

                    class="btn btn-primary"><i class="fas fa-save"></i>
                    Enregistrer</button> <button type="button" id="delete-contact-btn"

                    class="btn btn-danger delete-btn" style="display:none;"><i class="fas fa-trash"></i>
                    Supprimer</button> </div>
              </form>
            </div>
          </div>
  </body>
</html>
